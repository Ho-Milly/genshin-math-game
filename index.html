<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <title>提瓦特數學冒險 - 榮譽榜版</title>
    <style>
        :root { --paimon-gold: #f9d423; --genshin-blue: #4e9af1; --rarity-5: #ffb13f; --rarity-4: #d28fd6; }
        body { background-color: #f0f5f9; color: #333; font-family: "Microsoft JhengHei", sans-serif; display: flex; justify-content: center; align-items: center; height: 100vh; margin: 0; overflow: hidden; }
        
        #game-container { 
            width: 1100px; height: 750px; 
            background: linear-gradient(rgba(255,255,255,0.3), rgba(255,255,255,0.1)), url('https://fastcdn.hoyoverse.com/content-v2/g_impact/101419/f356f91361c40f5a70650d321d5164f9.jpg'); 
            background-size: cover; background-position: center; border: 5px solid #fff; border-radius: 25px; position: relative; box-shadow: 0 15px 40px rgba(0,0,0,0.2); 
        }

        /* UI 元件 */
        .header { position: absolute; top: 20px; left: 20px; right: 20px; display: flex; justify-content: space-between; z-index: 10; }
        .stat-box { background: rgba(255,255,255,0.9); padding: 8px 20px; border-radius: 30px; border: 2px solid var(--paimon-gold); font-weight: bold; display: flex; align-items: center; gap: 10px; box-shadow: 0 4px 10px rgba(0,0,0,0.1); }
        
        #side-panel { position: absolute; top: 80px; left: 20px; width: 280px; height: 480px; background: rgba(255,255,255,0.85); border-radius: 15px; padding: 15px; display: flex; flex-direction: column; }
        .tab-menu { display: flex; gap: 5px; margin-bottom: 10px; }
        .tab-btn { flex: 1; padding: 6px; font-size: 13px; cursor: pointer; border: 1px solid var(--genshin-blue); border-radius: 5px; background: #fff; font-weight: bold; }
        .tab-btn.active { background: var(--genshin-blue); color: #fff; }
        #quest-list { flex: 1; overflow-y: auto; display: flex; flex-direction: column; gap: 8px; }
        .q-item { padding: 12px; border-radius: 8px; background: #fff; border: 1px solid #ddd; cursor: pointer; font-size: 14px; transition: 0.2s; border-left: 5px solid var(--genshin-blue); }
        .q-item.done { background: #e0e0e0; color: #888; text-decoration: line-through; border-left-color: #999; cursor: default; }

        #bottom-ui { position: absolute; bottom: 20px; left: 20px; right: 20px; height: 160px; display: flex; gap: 15px; }
        #dialogue-box { flex: 1.5; background: rgba(255,255,255,0.95); border-radius: 15px; border: 3px solid var(--paimon-gold); display: flex; align-items: center; padding: 0 20px; }
        #inventory-box { flex: 1; background: rgba(255,255,255,0.8); border-radius: 15px; padding: 10px; display: grid; grid-template-columns: repeat(5, 1fr); gap: 8px; overflow-y: auto; border: 2px solid #ccc; }
        .inv-slot { aspect-ratio: 1/1.2; border-radius: 8px; display: flex; flex-direction: column; align-items: center; justify-content: center; position: relative; border: 1px solid #ddd; overflow: hidden; background: #fff; }
        .inv-slot img { width: 100%; height: 100%; object-fit: cover; }

        /* 彈窗與排行榜 */
        .modal { display: none; position: absolute; top: 50%; left: 50%; transform: translate(-50%, -50%); z-index: 100; text-align: center; }
        #quest-window, #leaderboard-window { width: 500px; background: #fff; padding: 30px; border-radius: 20px; border: 5px solid var(--paimon-gold); box-shadow: 0 0 50px rgba(0,0,0,0.3); }
        #wish-scene { width: 100%; height: 100%; top: 0; left: 0; transform: none; background: rgba(0,0,0,0.95); flex-direction: column; justify-content: center; align-items: center; }
        
        .rank-item { display: flex; justify-content: space-between; padding: 12px; border-bottom: 1px dashed #ccc; align-items: center; }
        .badge-5 { background: var(--rarity-5); color: white; padding: 2px 10px; border-radius: 10px; font-size: 12px; font-weight: bold; }

        .wish-btn { background: #ff7e33; color: white; border: none; padding: 10px 25px; border-radius: 30px; font-size: 16px; cursor: pointer; font-weight: bold; box-shadow: 0 4px 0 #c25e1a; transition: 0.1s; }
        .wish-btn:active { transform: translateY(2px); box-shadow: 0 2px 0 #c25e1a; }
        input { width: 80%; padding: 12px; font-size: 24px; margin: 20px 0; border: 2px solid #ddd; border-radius: 10px; text-align: center; }
        .scrollbar::-webkit-scrollbar { width: 6px; }
        .scrollbar::-webkit-scrollbar-thumb { background: var(--paimon-gold); border-radius: 10px; }
    </style>
</head>
<body>

<div id="game-container">
    <div class="header">
        <div class="stat-box">💎 原石：<span id="gem-count">0</span></div>
        <div class="stat-box">👤 <span id="display-name">旅行者</span></div>
        <div style="display:flex; gap:10px;">
            <button class="wish-btn" style="background:#67c23a; box-shadow: 0 4px 0 #4a8d29;" onclick="openLeaderboard()">🏆 榮譽榜</button>
            <button id="wish-main-btn" class="wish-btn" onclick="openWish()" disabled>✨ 祈願 (160)</button>
        </div>
    </div>

    <div id="side-panel">
        <div class="tab-menu">
            <button class="tab-btn active" onclick="switchTab(0)">單元1</button>
            <button class="tab-btn" onclick="switchTab(1)">單元2</button>
            <button class="tab-btn" onclick="switchTab(2)">單元3</button>
        </div>
        <div id="quest-list" class="scrollbar"></div>
    </div>

    <div id="bottom-ui">
        <div id="dialogue-box">
            <img src="https://gi.yatta.top/assets/UI/UI_AvatarIcon_Paimon.png" width="90">
            <div id="text-wrapper" style="margin-left:20px;">
                <b style="color:#d4a017; font-size:22px;">派蒙</b>
                <div id="text-content" style="font-size:17px; margin-top:5px; color:#555;">嘿！點擊「榮譽榜」看看你的冒險稱號吧！</div>
            </div>
        </div>
        <div id="inventory-box" class="scrollbar"></div>
    </div>

    <div id="quest-window" class="modal">
        <h3 id="q-title">冒險委託</h3>
        <p id="q-desc" style="text-align:left; line-height:1.7; font-size:18px; color:#444; background:#f9f9f9; padding:15px; border-radius:10px;"></p>
        <input type="number" step="0.001" id="q-input" placeholder="請輸入答案">
        <div style="display:flex; justify-content:center; gap:15px;">
            <button class="wish-btn" style="background:var(--genshin-blue); box-shadow:0 4px 0 #2a6dbd;" onclick="checkAnswer()">提交</button>
            <button class="wish-btn" style="background:#888; box-shadow:0 4px 0 #555;" onclick="closeQuest()">返回</button>
        </div>
    </div>

    <div id="leaderboard-window" class="modal">
        <h2 style="color:var(--paimon-gold); margin-top:0;">🏆 冒險者榮譽榜</h2>
        <div id="rank-list" style="text-align:left; margin:20px 0;">
            <div class="rank-item" style="background:#fff9e6; border-radius:10px; padding:15px; border:2px solid var(--paimon-gold);">
                <div>
                    <b id="rank-player-name" style="font-size:18px; color:var(--genshin-blue);">旅行者</b><br>
                    <small id="rank-title" style="color:#666;">稱號：新手冒險家</small>
                </div>
                <div style="text-align:right;">
                    <span class="badge-5" id="rank-gold-count">5★: 0</span><br>
                    <small>完成度: <span id="rank-progress">0</span>/30</small>
                </div>
            </div>
        </div>
        <p style="font-size:12px; color:#999;">(提示：這是你的本地紀錄，快截圖跟同學PK吧！)</p>
        <button class="wish-btn" style="width:100%;" onclick="closeLeaderboard()">返回冒險</button>
        <button class="wish-btn" style="background:#dc3545; box-shadow:0 4px 0 #a52834; margin-top:10px; font-size:12px; padding:5px;" onclick="resetGame()">重置存檔</button>
    </div>

    <div id="wish-scene" class="modal">
        <div id="wish-light" style="width:220px; height:220px; border-radius:50%; margin-bottom:30px; display:flex; align-items:center; justify-content:center; overflow:hidden; border:5px solid #fff;"></div>
        <h2 id="wish-result-name" style="color:white; font-size:36px; margin:10px 0;"></h2>
        <div id="wish-stars" style="color:var(--paimon-gold); font-size:30px; margin-bottom:20px;"></div>
        <button class="wish-btn" style="background:white; color:black; box-shadow:none;" onclick="closeWish()">確認收下</button>
    </div>
</div>

<script>
    let gems = 0, finishedCount = 0, currentIdx = -1, activeTab = 0, pityCount = 0, purplePity = 0;
    let inventory = [];
    let playerName = localStorage.getItem('genshin_math_name') || "";

    const allQuests = [
        // 單元1-3題目 (略，同前次完整列表)
        { q: "夏洛蒂整理支出：4.12 × 3.9 + 5.88 × 3.9 = ?", a: 39 },
        { q: "芙寧娜買甜點：60 - 1.42 - 9.58 = ?", a: 49 },
        { q: "美露莘的裝飾帶：12.5 × 8.8 - 2.5 × 8.8 = ?", a: 88 },
        { q: "沫芒宮材料：(3+9/17) × 0.5 + 0.5 × (2+8/17) = ?", a: 3 },
        { q: "水族館工程：(4/5) + (2/3) ÷ (5/6) = ?", a: 1.6 },
        { q: "歌劇院地板：5.5 × 2.4 + 4.5 × 2.4 = ?", a: 24 },
        { q: "零件運算：(1 + 16) × (15/17) = ?", a: 15 },
        { q: "加密電報：(7/12) × (9/4) × (4/5) = ?", a: 1.05 },
        { q: "巡查隊預算：100 ÷ (1.25 × 8) = ?", a: 10 },
        { q: "報社維修：7.2 × (1.8 + 2.2) = ?", a: 28.8 },
        { q: "教令院圓柱：直徑 10cm、高 12cm，表面積約多少 cm²？(π=3.14)", a: 533.8 },
        { q: "正方體體積：邊長 6cm 是邊長 3cm 的幾倍？", a: 8 },
        { q: "智慧宮石柱：底面 48cm²，體積 720cm³，柱高是幾 cm？", a: 15 },
        { q: "大巴札圓柱：半徑 10cm、高 20cm，體積多少 cm³？(π=3.14)", a: 6280 },
        { q: "三角柱機關：底長 6m、高 4m、柱高 6m，體積多少 m³？", a: 72 },
        { q: "長方體展開圖：長 27, 寬 19, 高 30，表面積是多少？", a: 1924 },
        { q: "梯形柱體：上底 5m、下底 17m、高 12m、柱高 6m，體積多少 m³？", a: 792 },
        { q: "書架圓柱：直徑 12cm、高 10cm，側面積多少 cm²？(π=3.14)", a: 376.8 },
        { q: "正方體表面積：面積 150cm²，邊長是多少 cm？", a: 5 },
        { q: "古遺跡長方體：體積 1000cm³，長 20、寬 10，高是多少 cm？", a: 5 },
        { q: "鍾離談話：語芯 14 歲，爸爸 56 歲（4倍），兩人相差幾歲？", a: 42 },
        { q: "萬民堂捐贈：口罩 9000 個是面罩 1800 個的幾倍？", a: 5 },
        { q: "北國銀行：氣炸鍋 3600 元打 85 折，便宜了多少元？", a: 540 },
        { q: "總務司米糧：白米 6.6kg，吃掉全部的 1/6，還剩多少 kg？", a: 5.5 },
        { q: "望舒客棧飲品：大杯 750ml 是小杯 350ml 的幾倍？(取 2.1)", a: 2.1 },
        { q: "南十字船隊：甲船 120 噸，乙船是甲船 0.8 倍，兩船共重多少噸？", a: 216 },
        { q: "雲翰社門票：全票 250 元，優待票 0.6 倍，優待票是多少元？", a: 150 },
        { q: "群玉閣預算：支出比去年多 0.2 倍，去年 500 萬，今年是多少？", a: 600 },
        { q: "古玩店花瓶：成本 800 元，加二成五出售，售價是多少？", a: 1000 },
        { q: "輕策莊收割：稻穀 1200kg，損耗 5%，剩下多少公斤？", a: 1140 }
    ];

    const characters = [
        { name: "芙寧娜", rarity: 5, color: "#ffb13f", img: "https://gi.yatta.top/assets/UI/UI_AvatarIcon_Furina.png" },
        { name: "納西妲", rarity: 5, color: "#ffb13f", img: "https://gi.yatta.top/assets/UI/UI_AvatarIcon_Nahida.png" },
        { name: "雷電將軍", rarity: 5, color: "#ffb13f", img: "https://gi.yatta.top/assets/UI/UI_AvatarIcon_Shougun.png" },
        { name: "香菱", rarity: 4, color: "#d28fd6", img: "https://gi.yatta.top/assets/UI/UI_AvatarIcon_Xiangling.png" },
        { name: "班尼特", rarity: 4, color: "#d28fd6", img: "https://gi.yatta.top/assets/UI/UI_AvatarIcon_Bennett.png" },
        { name: "黎明神劍", rarity: 3, color: "#4e9af1", img: "https://gi.yatta.top/assets/UI/UI_EquipIcon_Sword_Dawn.png" }
    ];

    // 初始化與存檔
    function initPlayer() {
        if (!playerName) {
            playerName = prompt("歡迎來到提瓦特數學冒險！請輸入你的冒險者暱稱：") || "無名旅行者";
            localStorage.setItem('genshin_math_name', playerName);
        }
        document.getElementById('display-name').innerText = playerName;
        loadData();
        renderQuests();
    }

    function saveData() {
        localStorage.setItem('genshin_math_save', JSON.stringify({
            gems, finishedCount, pityCount, purplePity, inventory,
            doneFlags: allQuests.map(q => q.done || false)
        }));
    }

    function loadData() {
        const saved = JSON.parse(localStorage.getItem('genshin_math_save'));
        if (saved) {
            gems = saved.gems; finishedCount = saved.finishedCount; pityCount = saved.pityCount;
            purplePity = saved.purplePity; inventory = saved.inventory;
            saved.doneFlags.forEach((f, i) => allQuests[i].done = f);
            updateStats(); updateInventory();
        }
    }

    // 排行榜邏輯
    function openLeaderboard() {
        const goldCount = inventory.filter(i => i.rarity === 5).length;
        const titles = ["新手冒險家", "資深旅行者", "提瓦特英雄", "歐皇轉世"];
        let titleIdx = Math.min(goldCount, titles.length - 1);
        
        document.getElementById('rank-player-name').innerText = playerName;
        document.getElementById('rank-gold-count').innerText = `5★: ${goldCount}`;
        document.getElementById('rank-progress').innerText = finishedCount;
        document.getElementById('rank-title').innerText = `稱號：${titles[titleIdx]}`;
        document.getElementById('leaderboard-window').style.display = 'block';
    }

    function closeLeaderboard() { document.getElementById('leaderboard-window').style.display = 'none'; }

    // 原有邏輯 (簡化)
    function renderQuests() {
        const list = document.getElementById('quest-list'); list.innerHTML = "";
        const start = activeTab * 10;
        for(let i=start; i<start+10; i++) {
            const div = document.createElement('div');
            div.className = `q-item ${allQuests[i].done ? 'done' : ''}`;
            div.innerHTML = `<b>委託 ${i+1}</b>: ${allQuests[i].q.substring(0, 15)}...`;
            div.onclick = () => !allQuests[i].done && openQuest(i);
            list.appendChild(div);
        }
    }

    function switchTab(t) { activeTab = t; document.querySelectorAll('.tab-btn').forEach((b,i)=>b.classList.toggle('active', i===t)); renderQuests(); }
    function openQuest(i) { currentIdx = i; document.getElementById('quest-window').style.display = 'block'; document.getElementById('q-desc').innerText = allQuests[i].q; }
    function closeQuest() { document.getElementById('quest-window').style.display = 'none'; document.getElementById('q-input').value = ""; }

    function checkAnswer() {
        let v = parseFloat(document.getElementById('q-input').value);
        if(Math.abs(v - allQuests[currentIdx].a) < 0.1) {
            gems += 160; finishedCount++; allQuests[currentIdx].done = true;
            saveData(); updateStats(); closeQuest(); renderQuests();
            typeWriter("太厲害了！原石已到手，進度已儲存！");
        } else { typeWriter("答案不太對喔，再算一下吧！"); }
    }

    function openWish() {
        if(gems < 160) return;
        gems -= 160; pityCount++; purplePity++;
        let res; const rand = Math.random();
        const light = document.getElementById('wish-light');
        light.classList.remove('gold-glow', 'purple-glow');

        if(rand < 0.05 || pityCount >= 21) { 
            res = characters[Math.floor(Math.random() * 3)]; light.classList.add('gold-glow'); pityCount = 0; purplePity = 0;
        } else if(rand < 0.20 || purplePity >= 10) { 
            res = characters[Math.floor(Math.random() * 2) + 3]; light.classList.add('purple-glow'); purplePity = 0;
        } else { res = characters[5]; }

        document.getElementById('wish-scene').style.display = 'flex';
        light.innerHTML = `<img src="${res.img}" width="100%">`;
        document.getElementById('wish-result-name').innerText = res.name;
        document.getElementById('wish-stars').innerText = "⭐".repeat(res.rarity);
        inventory.push(res); saveData(); updateStats(); updateInventory();
    }

    function updateStats() {
        document.getElementById('gem-count').innerText = gems;
        document.getElementById('wish-main-btn').disabled = gems < 160;
    }

    function updateInventory() {
        const box = document.getElementById('inventory-box');
        box.innerHTML = inventory.map(item => `<div class="inv-slot" style="background:linear-gradient(to bottom, #fff, ${item.color}44); border-bottom:3px solid ${item.color};"><img src="${item.img}"></div>`).join('');
    }

    function closeWish() { document.getElementById('wish-scene').style.display = 'none'; }
    function typeWriter(t) {
        const c = document.getElementById('text-content'); c.innerHTML = "";
        let i = 0; function s() { if(i<t.length){ c.innerHTML += t.charAt(i++); setTimeout(s, 30); } } s();
    }
    function resetGame() { if(confirm("確定重置進度嗎？所有角色都會消失喔！")) { localStorage.clear(); location.reload(); } }

    window.onload = initPlayer;
</script>
</body>
</html>
